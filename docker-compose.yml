services:
  free-deepseek-api:
    build: .
    restart: unless-stopped
    ports:
      - 9655:9655
    environment:
      HOST: 0.0.0.0
      PORT: 9655
      NON_INTERACTIVE: 1
      DEEPSEEK_AUTH_PATH: /config/deepseek-auth.json
      DEEPSEEK_TOKEN: ${DEEPSEEK_TOKEN:-}
      DEEPSEEK_HIF_DLIQ: ${DEEPSEEK_HIF_DLIQ:-}
      DEEPSEEK_HIF_LEIM: ${DEEPSEEK_HIF_LEIM:-}
      DEEPSEEK_COOKIE: ${DEEPSEEK_COOKIE:-}
      DEEPSEEK_WASM_URL: ${DEEPSEEK_WASM_URL:-}
    networks:
      - ai-mesh

networks:
  ai-mesh:
    name: ai_mesh
    external: true
